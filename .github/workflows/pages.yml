name: Deploy GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Assemble site
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p _site
          cp index.html v1.html v2.html v3.html site.webmanifest _site/
          shopt -s nullglob
          assets=( *.png *.jpg *.jpeg *.webp *.svg *.ico )
          if [ "${#assets[@]}" -gt 0 ]; then
            cp "${assets[@]}" _site/
          fi

      - uses: actions/configure-pages@v6

      - uses: actions/upload-pages-artifact@v4
        with:
          path: _site

      - id: deployment
        uses: actions/deploy-pages@v5
