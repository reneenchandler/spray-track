<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Spray Track">
<title>Spray Track v2</title>
<link rel="manifest" href="site.webmanifest">
<link rel="apple-touch-icon" href="sprayTrackIcon1024x1024.png">
<link rel="icon" type="image/png" href="icon.png">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

:root {
  --green:  #39FF14;
  --red:    #FF3B30;
  --amber:  #FFB800;
  --blue:   #0A84FF;
  --bg:     #080d08;
  --panel:  #0f150f;
  --border: #1a2a1a;
  --text:   #c8e6c8;
  --muted:  #3a5a3a;
}

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Courier New', monospace;
  height: 100dvh;
  display: flex;
  flex-direction: column;
  overflow: hidden;
  user-select: none;
}

/* ── SETUP ── */
#setup {
  position: fixed; inset: 0; z-index: 999;
  background: var(--bg);
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  padding: 32px 24px; gap: 14px;
  background-image:
    linear-gradient(rgba(57,255,20,0.03) 1px, transparent 1px),
    linear-gradient(90deg, rgba(57,255,20,0.03) 1px, transparent 1px);
  background-size: 44px 44px;
}
#setup.gone { display: none; }
#setup h1 {
  font-size: 52px; font-weight: 900;
  color: var(--green); line-height: 1; text-align: center;
  letter-spacing: -1px; font-family: system-ui, sans-serif;
}
#setup .sub {
  font-size: 10px; letter-spacing: 5px;
  color: var(--muted); margin-bottom: 10px;
}
.sf { width: 100%; max-width: 300px; }
.sf label {
  display: block; font-size: 10px; font-weight: 700;
  letter-spacing: 3px; color: var(--muted);
  margin-bottom: 5px; text-transform: uppercase;
}
.sf input, .sf select {
  width: 100%; background: var(--panel);
  border: 2px solid var(--border); border-radius: 6px;
  color: var(--text); font-size: 22px; padding: 13px 14px;
  outline: none; -webkit-appearance: none;
  font-family: 'Courier New', monospace;
}
.sf input:focus, .sf select:focus { border-color: var(--green); }
.sf select option { background: #0f150f; }

#goBtn {
  width: 100%; max-width: 300px;
  background: var(--green); border: none; border-radius: 8px;
  color: #000; font-size: 20px; font-weight: 900;
  letter-spacing: 3px; padding: 18px; cursor: pointer;
  font-family: 'Courier New', monospace; margin-top: 6px;
}
#goBtn:active { opacity: 0.8; }
#resumeBtn {
  width: 100%; max-width: 300px;
  background: transparent; border: 2px solid var(--green);
  border-radius: 8px; color: var(--green);
  font-size: 16px; font-weight: 700; letter-spacing: 2px;
  padding: 14px; cursor: pointer;
  font-family: 'Courier New', monospace;
  display: none;
}
#resumeBtn:active { background: rgba(57,255,20,0.1); }
#resumeMeta {
  font-size: 10px; letter-spacing: 1px;
  color: var(--muted); margin-top: 3px;
}
.sdivider {
  font-size: 10px; letter-spacing: 3px;
  color: var(--muted); text-align: center;
}
.snote {
  font-size: 10px; color: var(--muted);
  text-align: center; line-height: 1.7; max-width: 260px;
}

/* ── STATUS BAR ── */
#statusBar {
  background: var(--panel);
  border-bottom: 2px solid var(--border);
  padding: 8px 14px;
  display: flex; justify-content: space-between; align-items: center;
  flex-shrink: 0;
}
.logo {
  font-size: 13px; font-weight: bold;
  color: var(--green); letter-spacing: 2px;
}
#gpsStatus {
  display: flex; align-items: center; gap: 6px;
  font-size: 11px; font-weight: 700; letter-spacing: 1px;
}
.dot { width: 8px; height: 8px; border-radius: 50%; background: var(--muted); }
.dot.on  { background: var(--green); animation: blink 1.5s infinite; }
.dot.searching { background: var(--amber); animation: blink 0.8s infinite; }
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.3} }

/* ── MAP ── */
#mapWrap {
  flex: 1; position: relative; overflow: hidden;
  background: #090e09;
  background-image:
    linear-gradient(rgba(57,255,20,0.035) 1px, transparent 1px),
    linear-gradient(90deg, rgba(57,255,20,0.035) 1px, transparent 1px);
  background-size: 44px 44px;
}
canvas {
  position: absolute; top:0; left:0;
  width:100%; height:100%; touch-action: none;
}

/* Map overlay buttons */
.map-btn {
  position: absolute;
  background: rgba(8,13,8,0.92);
  border: 2px solid var(--border);
  border-radius: 6px;
  color: var(--muted);
  font-family: 'Courier New', monospace;
  font-size: 11px; font-weight: bold;
  letter-spacing: 1px; padding: 8px 12px;
  cursor: pointer;
}
.map-btn.active { border-color: var(--green); color: var(--green); }
.map-btn.amber  { border-color: var(--amber); color: var(--amber); }
#orientBtn { top: 12px; left: 12px; }
#followBtn { top: 52px; left: 12px; }
#passBadge {
  position: absolute; top: 12px; right: 12px;
  background: rgba(8,13,8,0.92);
  border: 1px solid var(--green); border-radius: 4px;
  padding: 6px 10px; font-size: 11px;
  color: var(--green); letter-spacing: 1px;
  pointer-events: none;
}

/* ── LIGHTBAR ── */
#lightbar {
  position: absolute;
  top: 10px; left: 50%; transform: translateX(-50%);
  display: none; flex-direction: column;
  align-items: center; gap: 3px; z-index: 30;
  pointer-events: none;
}
#lightbar.show { display: flex; }
#lbDots { display: flex; gap: 3px; align-items: center; }
.lbd {
  width: 13px; height: 13px; border-radius: 50%;
  background: #111; border: 1px solid #1a2a1a; flex-shrink: 0;
}
.lbd.cx { width: 15px; height: 15px; border-color: var(--green); background: #081408; }
.lbd.g  { background: var(--green); border-color: var(--green); box-shadow: 0 0 5px var(--green); }
.lbd.a  { background: var(--amber); border-color: var(--amber); box-shadow: 0 0 5px var(--amber); }
.lbd.r  { background: var(--red);   border-color: var(--red);   box-shadow: 0 0 5px var(--red); }
#lbText {
  font-size: 12px; font-weight: bold; letter-spacing: 2px;
  color: #fff; background: rgba(8,13,8,0.9);
  padding: 2px 10px; border-radius: 3px;
  border: 1px solid var(--border);
}

/* ── METRICS ── */
#metrics {
  display: grid; grid-template-columns: 1fr 1fr 1fr;
  background: var(--panel); border-top: 2px solid var(--border);
  flex-shrink: 0;
}
.metric {
  padding: 10px 6px; text-align: center;
  border-right: 1px solid var(--border);
}
.metric:last-child { border-right: none; }
.mlabel { font-size: 9px; font-weight: 700; letter-spacing: 2px; color: var(--muted); margin-bottom: 2px; }
.mval   { font-size: 26px; color: var(--green); line-height: 1; }
.munit  { font-size: 9px; color: var(--muted); letter-spacing: 1px; }

/* ── SWATH DISPLAY (read-only, tap to edit) ── */
#swathBar {
  background: var(--panel); border-top: 1px solid var(--border);
  padding: 8px 16px; display: flex; align-items: center;
  gap: 10px; flex-shrink: 0; cursor: pointer;
}
#swathBar span { font-size: 10px; font-weight: 700; letter-spacing: 3px; color: var(--muted); }
#swathDisplay {
  flex: 1; font-size: 16px; color: var(--green); text-align: right;
}
#swathEdit {
  display: none; position: fixed; inset: 0; z-index: 200;
  background: rgba(0,0,0,0.85); align-items: center; justify-content: center;
}
#swathEdit.show { display: flex; }
#swathEditBox {
  background: var(--panel); border: 2px solid var(--green);
  border-radius: 12px; padding: 28px 24px; width: 280px;
  display: flex; flex-direction: column; gap: 16px;
}
#swathEditBox label {
  font-size: 10px; letter-spacing: 3px; color: var(--muted); font-weight: 700;
}
#swathEditInput {
  width: 100%; background: var(--bg); border: 2px solid var(--border);
  border-radius: 6px; color: var(--text); font-size: 36px;
  padding: 10px 14px; outline: none; font-family: 'Courier New', monospace;
  text-align: center;
}
#swathEditInput:focus { border-color: var(--green); }
#swathEditOk {
  background: var(--green); border: none; border-radius: 6px;
  color: #000; font-size: 18px; font-weight: 900;
  letter-spacing: 2px; padding: 14px; cursor: pointer;
  font-family: 'Courier New', monospace;
}

/* ── MODE ROW ── */
#modeRow {
  background: var(--panel); border-top: 1px solid var(--border);
  display: flex; flex-shrink: 0;
}
.modeBtn {
  flex: 1; background: transparent; border: none;
  border-right: 1px solid var(--border);
  color: var(--muted); font-family: 'Courier New', monospace;
  font-size: 12px; font-weight: bold; letter-spacing: 1px;
  padding: 11px 8px; cursor: pointer; text-transform: uppercase;
}
.modeBtn:last-child { border-right: none; }
.modeBtn.active { color: var(--green); background: rgba(57,255,20,0.06); }

/* ── CONTROLS ── */
#controls {
  background: var(--panel); border-top: 2px solid var(--border);
  padding: 10px 12px 26px; display: flex; gap: 10px; flex-shrink: 0;
}
.btn {
  flex: 1; border: 2px solid var(--border); border-radius: 8px;
  background: transparent; color: var(--text);
  font-size: 14px; font-weight: 700; letter-spacing: 1px;
  padding: 16px 8px; text-transform: uppercase; cursor: pointer;
  font-family: 'Courier New', monospace;
}
.btn:active { opacity: 0.7; }
.btn-go {
  flex: 2; background: var(--green); border-color: var(--green);
  color: #000; font-size: 17px;
}
.btn-go.rec {
  background: var(--red); border-color: var(--red); color: #fff;
  animation: recpulse 1.5s infinite;
}
@keyframes recpulse {
  0%,100% { box-shadow: 0 0 0 0 rgba(255,59,48,0.4); }
  50%      { box-shadow: 0 0 0 8px rgba(255,59,48,0); }
}
.btn-clear { border-color: rgba(255,59,48,0.4); color: rgba(255,59,48,0.8); }
.btn-undo  { border-color: var(--muted); color: var(--muted); }

/* ── TOAST ── */
#toast {
  position: fixed; bottom: 130px; left: 50%; transform: translateX(-50%);
  background: rgba(8,13,8,0.95); border: 1px solid var(--green); color: var(--green);
  font-size: 11px; letter-spacing: 2px;
  padding: 10px 20px; border-radius: 4px; z-index: 500;
  opacity: 0; transition: opacity 0.3s; pointer-events: none; white-space: nowrap;
}
#toast.show { opacity: 1; }
</style>
</head>
<body>

<!-- SETUP -->
<div id="setup">
  <h1>SPRAY<br>TRACK</h1>
  <div class="sub">FIELD GUIDANCE · V2</div>

  <div class="sf">
    <label>Swath Width (ft)</label>
    <input type="number" id="inSwath" value="40" min="1" max="200" inputmode="numeric">
  </div>
  <div class="sf">
    <label>Units</label>
    <select id="inUnits">
      <option value="acres">Acres</option>
      <option value="hectares">Hectares</option>
    </select>
  </div>

  <button id="goBtn">NEW SESSION →</button>

  <div class="sdivider" id="orDiv" style="display:none">── OR ──</div>
  <button id="resumeBtn">⟳ RESUME SESSION</button>
  <div id="resumeMeta"></div>

  <div class="snote">Allow location access when prompted.<br>Add to Home Screen for best GPS performance.</div>
</div>

<!-- APP -->
<div id="statusBar">
  <div class="logo">SPRAY TRACK <span style="font-size:9px;color:#3a5a3a;letter-spacing:1px;">V2</span></div>
  <div id="gpsStatus">
    <div class="dot searching" id="gpsDot"></div>
    <span id="gpsText">ACQUIRING</span>
  </div>
</div>

<div id="mapWrap">
  <canvas id="cv"></canvas>
  <div id="passBadge">0 PASSES</div>
  <button class="map-btn active" id="orientBtn">↑ COURSE-UP</button>
  <button class="map-btn active" id="followBtn">📍 LOCKED</button>
  <div id="lightbar">
    <div id="lbDots"></div>
    <div id="lbText">WAITING</div>
  </div>
</div>

<div id="metrics">
  <div class="metric">
    <div class="mlabel">SPEED</div>
    <div class="mval" id="mSpeed">0.0</div>
    <div class="munit">MPH</div>
  </div>
  <div class="metric">
    <div class="mlabel">COVERED</div>
    <div class="mval" id="mArea">0.00</div>
    <div class="munit" id="mUnit">ACRES</div>
  </div>
  <div class="metric">
    <div class="mlabel">HEADING</div>
    <div class="mval" id="mHead">---</div>
    <div class="munit">DEG</div>
  </div>
</div>

<!-- Swath bar: shows current width, tap to edit -->
<div id="swathBar" onclick="openSwathEdit()">
  <span>SWATH WIDTH</span>
  <div id="swathDisplay">40 ft &nbsp;✎</div>
</div>

<!-- Swath edit overlay -->
<div id="swathEdit">
  <div id="swathEditBox">
    <label>SWATH WIDTH (FT)</label>
    <input type="number" id="swathEditInput" value="40" min="1" max="300" inputmode="numeric">
    <button id="swathEditOk" onclick="closeSwathEdit()">SET ✓</button>
  </div>
</div>

<div id="modeRow">
  <button class="modeBtn active" id="modePass" onclick="setMode('pass')">▶▶ PASS</button>
  <button class="modeBtn"        id="modeLoop" onclick="setMode('loop')">↺ LOOP</button>
</div>

<div id="controls">
  <button class="btn btn-clear" id="clearBtn">CLEAR</button>
  <button class="btn btn-go"    id="recBtn">▶ START PASS</button>
  <button class="btn btn-undo"  id="undoBtn">UNDO</button>
</div>

<div id="toast"></div>

<script>
'use strict';

// ═══════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════
var S = {
  swathFt:   40,
  units:     'acres',
  recording: false,
  loopMode:  false,
  courseUp:  true,
  following: true,
  passes:    [],        // [{pts:[{mx,my}], loop:bool}]
  curPass:   [],
  gpsReady:  false,
  heading:   null,      // smoothed heading degrees
  origin:    null,      // {lat,lon} world origin
  curMX:     0,
  curMY:     0,
  camMX:     0,
  camMY:     0,
  scale:     4,         // meters per pixel (world space)
  watchId:   null
};

var cv, ctx;
var lt = null, pd = null; // touch state

// ═══════════════════════════════════════════
// STORAGE
// ═══════════════════════════════════════════
var KEY = 'spraytrack_v2';

function save() {
  if (!S.origin) return;
  try {
    localStorage.setItem(KEY, JSON.stringify({
      swathFt: S.swathFt, units: S.units,
      origin: S.origin, passes: S.passes,
      ts: Date.now()
    }));
  } catch(e) {}
}

function load() {
  try { return JSON.parse(localStorage.getItem(KEY)); } catch(e) { return null; }
}

function clearSave() {
  try { localStorage.removeItem(KEY); } catch(e) {}
}

function fmtTime(ts) {
  if (!ts) return '';
  var d = new Date(ts);
  var h = d.getHours(), m = d.getMinutes(), ap = h >= 12 ? 'PM' : 'AM';
  return (d.getMonth()+1)+'/'+d.getDate()+' '+(h%12||12)+':'+(m<10?'0':'')+m+' '+ap;
}

// ═══════════════════════════════════════════
// SETUP / RESUME
// ═══════════════════════════════════════════
(function initSetup() {
  var saved = load();
  if (saved && saved.passes && saved.passes.length > 0) {
    document.getElementById('orDiv').style.display = 'block';
    document.getElementById('resumeBtn').style.display = 'block';
    var loops = saved.passes.filter(function(p){return p.loop;}).length;
    var passCt = saved.passes.length - loops;
    var parts = [];
    if (passCt) parts.push(passCt + (passCt===1?' PASS':' PASSES'));
    if (loops)  parts.push(loops  + (loops ===1?' LOOP':' LOOPS'));
    document.getElementById('resumeMeta').textContent =
      parts.join(' · ') + ' · ' + fmtTime(saved.ts);
  }

  document.getElementById('resumeBtn').addEventListener('click', function() {
    S.swathFt = saved.swathFt || 40;
    S.units   = saved.units   || 'acres';
    S.origin  = saved.origin;
    S.passes  = saved.passes;
    S.gpsReady = true;
    applySettings();
    launch();
    updateBadge(); calcArea();
    toast('RESUMED · ' + S.passes.length + ' PASS' + (S.passes.length!==1?'ES':'') + ' LOADED');
  });

  document.getElementById('goBtn').addEventListener('click', function() {
    S.swathFt = parseFloat(document.getElementById('inSwath').value) || 40;
    S.units   = document.getElementById('inUnits').value;
    clearSave();
    applySettings();
    launch();
  });
})();

function applySettings() {
  document.getElementById('swathDisplay').textContent = S.swathFt + ' ft  ✎';
  document.getElementById('swathEditInput').value = S.swathFt;
  document.getElementById('mUnit').textContent = S.units === 'acres' ? 'ACRES' : 'HECT';
}

function launch() {
  document.getElementById('setup').classList.add('gone');
  initCanvas();
  startGPS();
  doWakeLock();
  initOrientation();
}

// ═══════════════════════════════════════════
// SWATH EDIT OVERLAY
// ═══════════════════════════════════════════
function openSwathEdit() {
  document.getElementById('swathEditInput').value = S.swathFt;
  document.getElementById('swathEdit').classList.add('show');
  setTimeout(function(){ document.getElementById('swathEditInput').focus(); }, 100);
}
function closeSwathEdit() {
  var v = parseFloat(document.getElementById('swathEditInput').value);
  if (v > 0 && v <= 300) {
    S.swathFt = v;
    document.getElementById('swathDisplay').textContent = S.swathFt + ' ft  ✎';
    calcArea(); draw();
    toast('SWATH SET TO ' + S.swathFt + ' FT');
  }
  document.getElementById('swathEdit').classList.remove('show');
}
// Close on backdrop tap
document.getElementById('swathEdit').addEventListener('click', function(e) {
  if (e.target === this) closeSwathEdit();
});

// ═══════════════════════════════════════════
// CANVAS
// ═══════════════════════════════════════════
function initCanvas() {
  cv  = document.getElementById('cv');
  ctx = cv.getContext('2d');
  resize();
  window.addEventListener('resize', resize);
  cv.addEventListener('touchstart', onTS, { passive: false });
  cv.addEventListener('touchmove',  onTM, { passive: false });
  cv.addEventListener('touchend',   function(){ lt=null; pd=null; });
}

function resize() {
  var wrap = document.getElementById('mapWrap');
  var dpr  = window.devicePixelRatio || 1;
  cv.width  = wrap.clientWidth  * dpr;
  cv.height = wrap.clientHeight * dpr;
  cv.style.width  = wrap.clientWidth  + 'px';
  cv.style.height = wrap.clientHeight + 'px';
  draw();
}

// ═══════════════════════════════════════════
// TOUCH — pan & pinch
// ═══════════════════════════════════════════
function onTS(e) {
  if (e.touches.length === 1) {
    lt = { x: e.touches[0].clientX, y: e.touches[0].clientY };
    pd = null;
  } else if (e.touches.length === 2) {
    pd = tdist(e.touches); lt = null;
  }
}
function onTM(e) {
  e.preventDefault();
  if (e.touches.length === 1 && lt && !S.courseUp) {
    // pan only in north-up mode
    var dx = e.touches[0].clientX - lt.x;
    var dy = e.touches[0].clientY - lt.y;
    var dpr = window.devicePixelRatio || 1;
    S.camMX -= dx / (S.scale * dpr);
    S.camMY += dy / (S.scale * dpr);
    lt = { x: e.touches[0].clientX, y: e.touches[0].clientY };
    setFollow(false); draw();
  } else if (e.touches.length === 2 && pd) {
    var d = tdist(e.touches);
    S.scale = Math.max(0.5, Math.min(30, S.scale * d / pd));
    pd = d; draw();
  }
}
function tdist(t) {
  var dx = t[0].clientX-t[1].clientX, dy = t[0].clientY-t[1].clientY;
  return Math.sqrt(dx*dx+dy*dy);
}

// ═══════════════════════════════════════════
// GPS
// ═══════════════════════════════════════════
function startGPS() {
  if (!navigator.geolocation) { toast('NO GPS ON THIS DEVICE'); return; }
  S.watchId = navigator.geolocation.watchPosition(onPos, onErr, {
    enableHighAccuracy: true, maximumAge: 500, timeout: 15000
  });
}

function onPos(p) {
  var lat = p.coords.latitude;
  var lon = p.coords.longitude;
  var spd = p.coords.speed;    // m/s or null
  var hdg = p.coords.heading;  // degrees or null
  var acc = p.coords.accuracy;

  // Set origin on first fix
  if (!S.origin) {
    S.origin = { lat: lat, lon: lon };
    S.gpsReady = true;
    document.getElementById('gpsDot').className = 'dot on';
  }
  document.getElementById('gpsText').textContent = 'GPS ±' + Math.round(acc) + 'ft';

  // World coords (meters from origin)
  S.curMX = mxFromLon(lon);
  S.curMY = myFromLat(lat);

  if (S.following || S.courseUp) { S.camMX = S.curMX; S.camMY = S.curMY; }

  // Speed display
  var mph = (spd != null && spd > 0) ? spd * 2.23694 : 0;
  document.getElementById('mSpeed').textContent = mph.toFixed(1);

  // Heading — smooth, only when moving
  if (hdg != null && spd != null && spd > 0.2) {
    if (S.heading === null) {
      S.heading = hdg;
    } else {
      var diff = hdg - S.heading;
      if (diff >  180) diff -= 360;
      if (diff < -180) diff += 360;
      S.heading = (S.heading + diff * 0.25 + 360) % 360;
    }
    document.getElementById('mHead').textContent = Math.round(S.heading);
  }

  // Record point if moving fast enough and far enough from last point
  if (S.recording && spd != null && spd > 0.22) {
    var minDist = 1.5; // meters
    var ok = true;
    if (S.curPass.length > 0) {
      var last = S.curPass[S.curPass.length - 1];
      var ddx = S.curMX - last.mx, ddy = S.curMY - last.my;
      if (Math.sqrt(ddx*ddx + ddy*ddy) < minDist) ok = false;
    }
    if (ok) {
      S.curPass.push({ mx: S.curMX, my: S.curMY });
      calcArea();
    }
  }

  draw();
  updateLightbar();
}

function onErr(e) {
  document.getElementById('gpsDot').className = 'dot';
  document.getElementById('gpsText').textContent = e.code === 1 ? 'DENIED' : 'NO GPS';
  if (e.code === 1) toast('ALLOW LOCATION IN SETTINGS');
}

function mxFromLon(lon) {
  var R = 6371000;
  return R * (lon - S.origin.lon) * Math.PI / 180 * Math.cos(S.origin.lat * Math.PI / 180);
}
function myFromLat(lat) {
  return 6371000 * (lat - S.origin.lat) * Math.PI / 180;
}

// ═══════════════════════════════════════════
// DRAW  — coordinate rotation approach
// ═══════════════════════════════════════════
function draw() {
  if (!cv || !ctx) return;
  var W   = cv.width, H = cv.height;
  var dpr = window.devicePixelRatio || 1;
  var sc  = S.scale * dpr;

  ctx.clearRect(0, 0, W, H);

  // Tractor dot pinned here on screen
  var dotX = W / 2;
  var dotY = S.courseUp ? H * 0.68 : H / 2;

  // Camera reference — what world point maps to dotX/dotY
  var refMX = (S.courseUp || S.following) ? S.curMX : S.camMX;
  var refMY = (S.courseUp || S.following) ? S.curMY : S.camMY;

  // Rotation: rotate world coords so heading points up
  // heading=0°(N)→up, heading=90°(E)→right, etc.
  var rot = (S.courseUp && S.heading !== null) ? (S.heading * Math.PI / 180) : 0;
  var cosR = Math.cos(rot), sinR = Math.sin(rot);

  // Project world (mx,my) → screen (sx,sy)
  function sx(mx, my) {
    var dx = mx - refMX, dy = my - refMY;
    return dotX + ( dx * cosR + dy * sinR) * sc;
  }
  function sy(mx, my) {
    var dx = mx - refMX, dy = my - refMY;
    return dotY + (-dx * sinR + dy * cosR) * sc * -1;
    // North (dy+) maps to screen-up (sy-), so negate the y component
  }
  // Simpler: sy = dotY - (-dx*sinR + dy*cosR)*sc  ... let's be explicit:
  // unrotated: sy = dotY - dy*sc
  // rotated: sy = dotY - (dy*cosR - dx*sinR)*sc
  function ssy(mx, my) {
    var dx = mx - refMX, dy = my - refMY;
    return dotY - (dy * cosR - dx * sinR) * sc;
  }

  var swM = S.swathFt * 0.3048;

  // ── Draw completed passes ──
  for (var i = 0; i < S.passes.length; i++) {
    drawPass(S.passes[i].pts, swM, sx, ssy, false, S.passes[i].loop);
  }

  // ── Draw ghost line (next ideal pass) ──
  if (S.passes.length > 0 && !S.recording) {
    drawGhost(swM, sx, ssy);
  }

  // ── Draw current pass ──
  if (S.curPass.length > 1) {
    drawPass(S.curPass, swM, sx, ssy, true, S.loopMode);
  }

  // ── Tractor dot (always at dotX, dotY) ──
  if (S.gpsReady) {
    var swPx = swM * sc;
    var r = Math.max(5, Math.min(12, swPx / 8)) * dpr;

    // Glow
    ctx.beginPath();
    ctx.arc(dotX, dotY, r * 2.8, 0, Math.PI*2);
    ctx.fillStyle = S.recording ? 'rgba(255,59,48,0.12)' : 'rgba(57,255,20,0.10)';
    ctx.fill();

    // Dot
    ctx.beginPath();
    ctx.arc(dotX, dotY, r, 0, Math.PI*2);
    ctx.fillStyle = S.recording ? '#FF3B30' : '#39FF14';
    ctx.fill();
    ctx.strokeStyle = '#fff';
    ctx.lineWidth = 2 * dpr;
    ctx.stroke();

    // Forward arrow — straight up in course-up, or toward heading in north-up
    var arrowLen = 52 * dpr;
    var aAng = S.courseUp ? -Math.PI/2
      : (S.heading !== null ? (S.heading - 90) * Math.PI / 180 : -Math.PI/2);
    ctx.beginPath();
    ctx.moveTo(dotX, dotY);
    ctx.lineTo(dotX + Math.cos(aAng)*arrowLen, dotY + Math.sin(aAng)*arrowLen);
    ctx.strokeStyle = S.recording ? '#FF3B30' : '#39FF14';
    ctx.lineWidth = 3 * dpr;
    ctx.setLineDash([8*dpr, 5*dpr]);
    ctx.stroke();
    ctx.setLineDash([]);
  }

  // ── North indicator (course-up only) ──
  if (S.courseUp && S.heading !== null) {
    drawNorth(W, H, dpr);
  }

  // ── Scale bar ──
  drawScale(W, H, dpr, sc);
}

// ── Ghost line: dotted line showing where next pass centerline should be ──
function drawGhost(swM, sx, ssy) {
  // Find nearest pass to current position
  var best = null, bestDist = Infinity;
  for (var i = 0; i < S.passes.length; i++) {
    var info = distToPass(S.passes[i].pts, S.curMX, S.curMY);
    if (Math.abs(info.dist) < bestDist) {
      bestDist = Math.abs(info.dist);
      best = { pass: S.passes[i], info: info };
    }
  }
  if (!best || best.pass.pts.length < 2) return;

  var pts = best.pass.pts;
  // Offset each point by one swath width perpendicular to pass direction
  // Determine which side: use the sign of lateral offset
  var sign = best.info.lateral >= 0 ? 1 : -1;

  ctx.beginPath();
  ctx.setLineDash([12, 8]);
  ctx.strokeStyle = 'rgba(57,255,20,0.35)';
  ctx.lineWidth = 2;

  for (var i = 0; i < pts.length; i++) {
    var dmx, dmy;
    if (i < pts.length - 1) {
      dmx = pts[i+1].mx - pts[i].mx; dmy = pts[i+1].my - pts[i].my;
    } else {
      dmx = pts[i].mx - pts[i-1].mx; dmy = pts[i].my - pts[i-1].my;
    }
    var len = Math.sqrt(dmx*dmx + dmy*dmy) || 1;
    // Perpendicular (right-hand normal)
    var nx = dmy / len, ny = -dmx / len;
    var gmx = pts[i].mx + nx * swM * sign;
    var gmy = pts[i].my + ny * swM * sign;
    if (i === 0) ctx.moveTo(sx(gmx, gmy), ssy(gmx, gmy));
    else         ctx.lineTo(sx(gmx, gmy), ssy(gmx, gmy));
  }
  ctx.stroke();
  ctx.setLineDash([]);
}

// ── Draw a pass or loop ──
function drawPass(pts, swM, sx, ssy, active, isLoop) {
  if (pts.length < 2) return;

  // Build offset polygon in world space, then project
  var L = [], R = [];
  var n = isLoop ? pts.length : pts.length;
  for (var i = 0; i < n; i++) {
    var dmx, dmy;
    if (i < pts.length - 1) {
      dmx = pts[i+1].mx - pts[i].mx; dmy = pts[i+1].my - pts[i].my;
    } else if (isLoop && pts.length > 2) {
      dmx = pts[1].mx - pts[0].mx; dmy = pts[1].my - pts[0].my; // wrap
    } else {
      dmx = pts[i].mx - pts[i-1].mx; dmy = pts[i].my - pts[i-1].my;
    }
    var len = Math.sqrt(dmx*dmx + dmy*dmy) || 1;
    var ox = (dmy / len) * (swM / 2);
    var oy = (-dmx / len) * (swM / 2); // Note: dy maps to -screen-y
    // Actually keep offsets in world space consistently:
    var offX = (dmy / len) * (swM / 2);
    var offY = (dmx / len) * (swM / 2);
    L.push({ mx: pts[i].mx - offX, my: pts[i].my - offY });
    R.push({ mx: pts[i].mx + offX, my: pts[i].my + offY });
  }

  if (isLoop && pts.length > 3) {
    // Filled ring using evenodd
    ctx.beginPath();
    // Outer ring
    ctx.moveTo(sx(R[0].mx, R[0].my), ssy(R[0].mx, R[0].my));
    for (var j = 1; j < R.length; j++) ctx.lineTo(sx(R[j].mx, R[j].my), ssy(R[j].mx, R[j].my));
    ctx.closePath();
    // Inner ring (hole)
    ctx.moveTo(sx(L[0].mx, L[0].my), ssy(L[0].mx, L[0].my));
    for (var k = 1; k < L.length; k++) ctx.lineTo(sx(L[k].mx, L[k].my), ssy(L[k].mx, L[k].my));
    ctx.closePath();
    ctx.fillStyle = active ? 'rgba(57,255,20,0.38)' : 'rgba(57,255,20,0.20)';
    ctx.fill('evenodd');
    ctx.strokeStyle = active ? '#39FF14' : 'rgba(57,255,20,0.65)';
    ctx.lineWidth = (active ? 2.5 : 1.5) * (window.devicePixelRatio||1);
    // Centerline
    ctx.beginPath();
    ctx.moveTo(sx(pts[0].mx, pts[0].my), ssy(pts[0].mx, pts[0].my));
    for (var m = 1; m < pts.length; m++) ctx.lineTo(sx(pts[m].mx, pts[m].my), ssy(pts[m].mx, pts[m].my));
    ctx.closePath();
    ctx.stroke();
  } else {
    // Standard pass polygon
    var poly = L.concat(R.slice().reverse());
    ctx.beginPath();
    ctx.moveTo(sx(poly[0].mx, poly[0].my), ssy(poly[0].mx, poly[0].my));
    for (var j = 1; j < poly.length; j++) ctx.lineTo(sx(poly[j].mx, poly[j].my), ssy(poly[j].mx, poly[j].my));
    ctx.closePath();
    ctx.fillStyle = active ? 'rgba(57,255,20,0.38)' : 'rgba(57,255,20,0.18)';
    ctx.fill();
    ctx.strokeStyle = active ? '#39FF14' : 'rgba(57,255,20,0.55)';
    ctx.lineWidth = (active ? 2.5 : 1.5) * (window.devicePixelRatio||1);
    ctx.stroke();
  }
}

function drawNorth(W, H, dpr) {
  var cx = W - 40*dpr, cy = 40*dpr, r = 20*dpr;
  // North direction on screen when rotated: heading=0→up(-π/2), heading=90→left(-π)
  var na = -Math.PI/2 - (S.heading * Math.PI / 180);
  ctx.save(); ctx.translate(cx, cy);
  ctx.beginPath(); ctx.arc(0,0,r,0,Math.PI*2);
  ctx.fillStyle = 'rgba(8,13,8,0.88)'; ctx.fill();
  ctx.strokeStyle = '#1a2a1a'; ctx.lineWidth = 1.5; ctx.stroke();
  var tx = Math.cos(na)*(r-6), ty = Math.sin(na)*(r-6);
  ctx.beginPath();
  ctx.moveTo(-tx*0.5, -ty*0.5);
  ctx.lineTo(tx, ty);
  ctx.strokeStyle = '#FF3B30'; ctx.lineWidth = 2.5; ctx.stroke();
  ctx.fillStyle = '#FF3B30';
  ctx.font = 'bold '+(9*dpr)+'px monospace';
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.fillText('N', tx*0.55, ty*0.55);
  ctx.restore();
}

function drawScale(W, H, dpr, sc) {
  // Show a 100ft scale bar
  var barM  = 30.48; // 100 ft in meters
  var barPx = barM * sc;
  var bx = 16*dpr, by = H - 28*dpr;
  ctx.fillStyle = 'rgba(57,255,20,0.6)';
  ctx.fillRect(bx, by, barPx, 2*dpr);
  ctx.fillRect(bx, by-4*dpr, 2*dpr, 10*dpr);
  ctx.fillRect(bx+barPx-2*dpr, by-4*dpr, 2*dpr, 10*dpr);
  ctx.font = (9*dpr)+'px monospace';
  ctx.fillStyle = 'rgba(57,255,20,0.6)';
  ctx.textAlign = 'left'; ctx.textBaseline = 'bottom';
  ctx.fillText('100 ft', bx, by-6*dpr);
}

// ═══════════════════════════════════════════
// LIGHTBAR
// ═══════════════════════════════════════════
function updateLightbar() {
  var lb    = document.getElementById('lightbar');
  var lbTxt = document.getElementById('lbText');
  var lbDts = document.getElementById('lbDots');

  if (S.passes.length === 0 || !S.gpsReady) {
    lb.classList.remove('show'); return;
  }

  // Find nearest completed pass
  var bestLat = Infinity, bestPass = null;
  for (var i = 0; i < S.passes.length; i++) {
    var info = distToPass(S.passes[i].pts, S.curMX, S.curMY);
    if (Math.abs(info.lateral) < Math.abs(bestLat)) {
      bestLat = info.lateral; bestPass = S.passes[i];
    }
  }
  if (!bestPass) { lb.classList.remove('show'); return; }

  var swM = S.swathFt * 0.3048;
  // How far from the NEXT ideal pass centerline
  var ideal = bestLat >= 0 ? swM - bestLat : -(swM + bestLat);
  var errFt = ideal / 0.3048;

  // Build dots
  var DOTS = 9, mid = 4;
  var deflect = Math.round((errFt / (S.swathFt * 0.55)) * mid);
  deflect = Math.max(-mid, Math.min(mid, deflect));

  lbDts.innerHTML = '';
  for (var d = 0; d < DOTS; d++) {
    var el = document.createElement('div');
    el.className = 'lbd' + (d===mid ? ' cx' : '');
    var lit = (deflect>0 && d>mid && d<=mid+deflect) ||
              (deflect<0 && d<mid && d>=mid+deflect) ||
              (deflect===0 && d===mid);
    if (lit) {
      var a = Math.abs(deflect);
      el.classList.add(a<=1?'g': a<=2?'a':'r');
    }
    lbDts.appendChild(el);
  }

  var absErr = Math.abs(errFt);
  if (absErr < 2) {
    lbTxt.textContent = '✓ ON TRACK';
    lbTxt.style.color = '#39FF14';
  } else {
    var dir = errFt > 0 ? '← LEFT' : 'RIGHT →';
    lbTxt.textContent = dir + ' ' + absErr.toFixed(0) + 'ft';
    lbTxt.style.color = absErr > S.swathFt * 0.3 ? '#FF3B30' : '#FFB800';
  }
  lb.classList.add('show');
}

// Signed perpendicular distance from pass centerline
// + = right of travel direction, - = left
function distToPass(pts, mx, my) {
  var minD = Infinity, lat = 0, dist = 0;
  for (var i = 0; i < pts.length-1; i++) {
    var ax=pts[i].mx, ay=pts[i].my, bx=pts[i+1].mx, by=pts[i+1].my;
    var abx=bx-ax, aby=by-ay, len2=abx*abx+aby*aby;
    if (len2===0) continue;
    var t = Math.max(0, Math.min(1, ((mx-ax)*abx+(my-ay)*aby)/len2));
    var cx2=ax+t*abx, cy2=ay+t*aby;
    var dx=mx-cx2, dy=my-cy2;
    var d=Math.sqrt(dx*dx+dy*dy);
    if (d<minD) {
      minD=d; dist=d;
      var cross=abx*dy-aby*dx;
      lat = cross>=0 ? d : -d;
    }
  }
  return { lateral: lat, dist: dist };
}

// ═══════════════════════════════════════════
// AREA
// ═══════════════════════════════════════════
function calcArea() {
  var swM = S.swathFt * 0.3048, total = 0;
  var all = S.recording
    ? S.passes.concat([{pts:S.curPass,loop:S.loopMode}])
    : S.passes;
  for (var i=0; i<all.length; i++) {
    var pts = all[i].pts;
    for (var j=1; j<pts.length; j++) {
      var dx=pts[j].mx-pts[j-1].mx, dy=pts[j].my-pts[j-1].my;
      total += Math.sqrt(dx*dx+dy*dy)*swM;
    }
  }
  var area = S.units==='acres' ? total/4046.86 : total/10000;
  document.getElementById('mArea').textContent = area.toFixed(2);
}

function updateBadge() {
  var loops = S.passes.filter(function(p){return p.loop;}).length;
  var ps    = S.passes.length - loops;
  var parts = [];
  if (ps)    parts.push(ps + (ps===1?' PASS':' PASSES'));
  if (loops) parts.push(loops + (loops===1?' LOOP':' LOOPS'));
  document.getElementById('passBadge').textContent = parts.length ? parts.join(' · ') : '0 PASSES';
}

// ═══════════════════════════════════════════
// RECORD / UNDO / CLEAR
// ═══════════════════════════════════════════
document.getElementById('recBtn').addEventListener('click', function() {
  if (!S.gpsReady) { toast('WAITING FOR GPS'); return; }
  if (!S.recording) {
    S.recording = true;
    S.curPass = [];
    this.textContent = S.loopMode ? '⏹ END LOOP' : '⏹ END PASS';
    this.classList.add('rec');
    setFollow(true);
    toast(S.loopMode ? 'LOOP STARTED — DRIVE FIELD EDGE' : 'PASS STARTED');
  } else {
    S.recording = false;
    if (S.curPass.length > 1) {
      S.passes.push({ pts: S.curPass.slice(), loop: S.loopMode });
      updateBadge(); calcArea(); save();
      toast((S.loopMode?'LOOP ':'PASS ') + S.passes.length + ' SAVED');
    } else {
      toast('TOO SHORT — DRIVE FIRST');
    }
    S.curPass = [];
    this.textContent = S.loopMode ? '▶ START LOOP' : '▶ START PASS';
    this.classList.remove('rec');
    draw();
  }
});

document.getElementById('undoBtn').addEventListener('click', function() {
  if (S.recording) {
    S.recording = false; S.curPass = [];
    document.getElementById('recBtn').textContent = S.loopMode ? '▶ START LOOP' : '▶ START PASS';
    document.getElementById('recBtn').classList.remove('rec');
    toast('PASS CANCELLED'); draw(); return;
  }
  if (S.passes.length === 0) { toast('NOTHING TO UNDO'); return; }
  S.passes.pop(); updateBadge(); calcArea(); save();
  toast('LAST PASS REMOVED'); draw();
});

document.getElementById('clearBtn').addEventListener('click', function() {
  if (S.passes.length===0 && S.curPass.length===0) { toast('NOTHING TO CLEAR'); return; }
  if (!confirm('Clear all passes and start fresh?')) return;
  S.passes=[]; S.curPass=[]; S.recording=false;
  document.getElementById('recBtn').textContent = '▶ START PASS';
  document.getElementById('recBtn').classList.remove('rec');
  document.getElementById('mArea').textContent = '0.00';
  document.getElementById('lightbar').classList.remove('show');
  clearSave(); updateBadge(); draw(); toast('CLEARED');
});

// ═══════════════════════════════════════════
// MODE
// ═══════════════════════════════════════════
function setMode(m) {
  if (S.recording) { toast('END CURRENT '+(S.loopMode?'LOOP':'PASS')+' FIRST'); return; }
  S.loopMode = (m==='loop');
  document.getElementById('modePass').classList.toggle('active', !S.loopMode);
  document.getElementById('modeLoop').classList.toggle('active',  S.loopMode);
  document.getElementById('recBtn').textContent = S.loopMode ? '▶ START LOOP' : '▶ START PASS';
  toast(S.loopMode ? 'LOOP MODE: DRIVE FULL PERIMETER' : 'PASS MODE: DRIVE STRAIGHT LINES');
}

// ═══════════════════════════════════════════
// ORIENT & FOLLOW
// ═══════════════════════════════════════════
document.getElementById('orientBtn').addEventListener('click', function() {
  S.courseUp = !S.courseUp;
  this.textContent = S.courseUp ? '↑ COURSE-UP' : '↑ NORTH-UP';
  this.classList.toggle('active',  S.courseUp);
  this.classList.toggle('amber',  !S.courseUp);
  var fb = document.getElementById('followBtn');
  if (S.courseUp) {
    fb.textContent = '📍 LOCKED'; fb.classList.add('active'); fb.classList.remove('amber');
  } else {
    fb.textContent = '📍 FOLLOWING'; setFollow(true);
  }
  toast(S.courseUp ? 'COURSE-UP: TRAVEL = UP' : 'NORTH-UP MODE');
  draw();
});

document.getElementById('followBtn').addEventListener('click', function() {
  if (S.courseUp) return; // always locked in course-up
  setFollow(!S.following);
});

function setFollow(on) {
  S.following = on;
  var fb = document.getElementById('followBtn');
  fb.textContent = on ? '📍 FOLLOWING' : '📍 PANNING';
  fb.classList.toggle('active', on);
  fb.classList.toggle('amber', !on);
  if (on && S.gpsReady) { S.camMX=S.curMX; S.camMY=S.curMY; draw(); }
}

// ═══════════════════════════════════════════
// TOAST
// ═══════════════════════════════════════════
function toast(msg) {
  var t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  clearTimeout(t._t);
  t._t = setTimeout(function(){ t.classList.remove('show'); }, 2500);
}

// ═══════════════════════════════════════════
// WAKE LOCK
// ═══════════════════════════════════════════
async function doWakeLock() {
  if ('wakeLock' in navigator) {
    try { await navigator.wakeLock.request('screen'); } catch(e) {}
  }
}
document.addEventListener('visibilitychange', function() {
  if (document.visibilityState==='visible') doWakeLock();
});

// ═══════════════════════════════════════════
// DEVICE ORIENTATION (compass fallback)
// ═══════════════════════════════════════════
function initOrientation() {
  var req = typeof DeviceOrientationEvent !== 'undefined' &&
            typeof DeviceOrientationEvent.requestPermission === 'function';
  if (req) {
    DeviceOrientationEvent.requestPermission()
      .then(function(p){ if(p==='granted') window.addEventListener('deviceorientation', onOrient); })
      .catch(function(){});
  } else {
    window.addEventListener('deviceorientation', onOrient);
  }
}

function onOrient(e) {
  var h = e.webkitCompassHeading != null ? e.webkitCompassHeading
        : (e.alpha != null ? (360-e.alpha)%360 : null);
  // Only use device orientation as fallback when GPS heading unavailable
  if (h != null && S.heading === null) {
    S.heading = h;
    document.getElementById('mHead').textContent = Math.round(h);
    draw();
  }
}
</script>
