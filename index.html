<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Spray Tracker</title>
<style>
  :root {
    --green: #39FF14;
    --amber: #FFB800;
    --red: #FF3B30;
    --bg: #0a0f0a;
    --panel: #111811;
    --border: #1e2e1e;
    --text: #c8e6c8;
    --muted: #4a6a4a;
    --spray-color: rgba(57,255,20,0.35);
    --spray-border: rgba(57,255,20,0.8);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: system-ui, -apple-system, sans-serif;
    height: 100dvh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    user-select: none;
  }

  /* ── TOP STATUS BAR ── */
  #statusBar {
    background: var(--panel);
    border-bottom: 2px solid var(--border);
    padding: 8px 12px 6px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    flex-shrink: 0;
  }
  #statusBar .logo {
    font-family: 'Courier New', Courier, monospace;
    font-size: 13px;
    color: var(--green);
    letter-spacing: 2px;
  }
  #gpsStatus {
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 1px;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .gps-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--muted);
    animation: none;
  }
  .gps-dot.active { background: var(--green); animation: pulse 1.5s infinite; }
  .gps-dot.searching { background: var(--amber); animation: pulse 0.8s infinite; }
  @keyframes pulse {
    0%,100% { opacity: 1; }
    50% { opacity: 0.3; }
  }

  /* ── MAP CANVAS ── */
  #mapWrap {
    flex: 1;
    position: relative;
    overflow: hidden;
    background: #0d150d;
    background-image:
      linear-gradient(rgba(57,255,20,0.04) 1px, transparent 1px),
      linear-gradient(90deg, rgba(57,255,20,0.04) 1px, transparent 1px);
    background-size: 40px 40px;
  }
  canvas#mapCanvas {
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    touch-action: none;
  }

  /* heading arrow overlay */
  #headingArrow {
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    width: 20px; height: 20px;
    pointer-events: none;
    z-index: 10;
  }

  /* ── METRICS ROW ── */
  #metrics {
    background: var(--panel);
    border-top: 2px solid var(--border);
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    flex-shrink: 0;
  }
  .metric {
    padding: 10px 8px;
    text-align: center;
    border-right: 1px solid var(--border);
  }
  .metric:last-child { border-right: none; }
  .metric-label {
    font-size: 10px;
    letter-spacing: 2px;
    color: var(--muted);
    font-weight: 700;
    text-transform: uppercase;
    margin-bottom: 2px;
  }
  .metric-value {
    font-family: 'Courier New', Courier, monospace;
    font-size: 22px;
    color: var(--green);
    line-height: 1;
  }
  .metric-unit {
    font-size: 10px;
    color: var(--muted);
    letter-spacing: 1px;
  }

  /* ── SWATH WIDTH CONTROL ── */
  #swathControl {
    background: var(--panel);
    border-top: 1px solid var(--border);
    padding: 8px 16px;
    display: flex;
    align-items: center;
    gap: 12px;
    flex-shrink: 0;
  }
  #swathControl .sw-label {
    font-size: 11px;
    letter-spacing: 2px;
    color: var(--muted);
    font-weight: 700;
    flex-shrink: 0;
  }
  #swathSlider {
    flex: 1;
    -webkit-appearance: none;
    height: 4px;
    background: var(--border);
    border-radius: 2px;
    outline: none;
  }
  #swathSlider::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 24px; height: 24px;
    border-radius: 50%;
    background: var(--green);
    cursor: pointer;
  }
  #swathVal {
    font-family: 'Courier New', Courier, monospace;
    font-size: 14px;
    color: var(--green);
    min-width: 52px;
    text-align: right;
  }

  /* ── BOTTOM CONTROLS ── */
  #controls {
    background: var(--panel);
    border-top: 2px solid var(--border);
    padding: 10px 12px 20px;
    display: flex;
    gap: 10px;
    flex-shrink: 0;
  }
  .btn {
    flex: 1;
    border: 2px solid var(--border);
    border-radius: 6px;
    background: transparent;
    color: var(--text);
    font-family: system-ui, -apple-system, sans-serif;
    font-size: 15px;
    font-weight: 700;
    letter-spacing: 2px;
    padding: 14px 8px;
    text-transform: uppercase;
    cursor: pointer;
    transition: all 0.1s;
    -webkit-tap-highlight-color: transparent;
  }
  .btn:active { transform: scale(0.96); }
  .btn-primary {
    background: var(--green);
    border-color: var(--green);
    color: #000;
    font-size: 17px;
    flex: 2;
  }
  .btn-primary.recording {
    background: var(--red);
    border-color: var(--red);
    color: #fff;
    animation: recordPulse 1.5s infinite;
  }
  @keyframes recordPulse {
    0%,100% { box-shadow: 0 0 0 0 rgba(255,59,48,0.5); }
    50% { box-shadow: 0 0 0 8px rgba(255,59,48,0); }
  }
  .btn-danger {
    border-color: rgba(255,59,48,0.4);
    color: rgba(255,59,48,0.7);
  }
  .btn-secondary {
    border-color: var(--muted);
    color: var(--muted);
  }

  /* ── PASS COUNT BADGE ── */
  #passBadge {
    position: absolute;
    top: 12px; right: 12px;
    background: rgba(10,15,10,0.85);
    border: 1px solid var(--green);
    border-radius: 4px;
    padding: 6px 10px;
    font-family: 'Courier New', Courier, monospace;
    font-size: 12px;
    color: var(--green);
    letter-spacing: 1px;
    z-index: 20;
    pointer-events: none;
  }

  /* ── OVERLAP INDICATOR ── */
  #overlapAlert {
    position: absolute;
    top: 12px; left: 12px;
    background: rgba(255,59,48,0.15);
    border: 1px solid var(--red);
    border-radius: 4px;
    padding: 6px 10px;
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 2px;
    color: var(--red);
    z-index: 20;
    display: none;
    pointer-events: none;
  }

  /* ── TOAST ── */
  #toast {
    position: fixed;
    bottom: 120px;
    left: 50%; transform: translateX(-50%);
    background: rgba(57,255,20,0.15);
    border: 1px solid var(--green);
    color: var(--green);
    font-family: 'Courier New', Courier, monospace;
    font-size: 12px;
    letter-spacing: 2px;
    padding: 10px 20px;
    border-radius: 4px;
    z-index: 100;
    opacity: 0;
    transition: opacity 0.3s;
    pointer-events: none;
    white-space: nowrap;
  }
  #toast.show { opacity: 1; }

  /* ── COMPASS ── */
  #compass {
    position: absolute;
    bottom: 16px; right: 16px;
    width: 44px; height: 44px;
    z-index: 20;
    pointer-events: none;
  }
  #compass svg { width: 100%; height: 100%; }

  /* ── FOLLOW BUTTON ── */
  #followBtn {
    position: absolute;
    bottom: 16px; left: 16px;
    background: rgba(10,15,10,0.85);
    border: 1px solid var(--green);
    border-radius: 4px;
    padding: 8px 12px;
    font-family: 'Courier New', Courier, monospace;
    font-size: 11px;
    color: var(--green);
    letter-spacing: 1px;
    z-index: 20;
    cursor: pointer;
  }
  #followBtn.off {
    border-color: var(--muted);
    color: var(--muted);
  }

  /* ── SCREEN WAKE LOCK INDICATOR ── */
  #wakeLock {
    position: absolute;
    bottom: 50px; left: 16px;
    font-size: 10px;
    color: var(--muted);
    letter-spacing: 1px;
    z-index: 20;
    pointer-events: none;
  }

  /* ── SETUP SCREEN ── */
  #setupScreen {
    position: fixed;
    inset: 0;
    background: var(--bg);
    z-index: 200;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 40px 24px;
    gap: 0;
  }
  #setupScreen.hidden { display: none; }
  .setup-logo {
    font-family: system-ui, -apple-system, sans-serif;
    font-size: 52px;
    font-weight: 900;
    color: var(--green);
    letter-spacing: -1px;
    line-height: 1;
    margin-bottom: 4px;
  }
  .setup-sub {
    font-family: 'Courier New', Courier, monospace;
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 4px;
    margin-bottom: 40px;
  }
  .setup-field {
    width: 100%;
    max-width: 320px;
    margin-bottom: 16px;
  }
  .setup-field label {
    display: block;
    font-size: 11px;
    letter-spacing: 3px;
    color: var(--muted);
    font-weight: 700;
    margin-bottom: 6px;
    text-transform: uppercase;
  }
  .setup-field input, .setup-field select {
    width: 100%;
    background: var(--panel);
    border: 2px solid var(--border);
    border-radius: 4px;
    color: var(--text);
    font-family: 'Courier New', Courier, monospace;
    font-size: 18px;
    padding: 12px 14px;
    outline: none;
    -webkit-appearance: none;
  }
  .setup-field input:focus, .setup-field select:focus {
    border-color: var(--green);
  }
  .setup-field select option { background: #111; }
  .setup-start {
    margin-top: 24px;
    width: 100%;
    max-width: 320px;
    background: var(--green);
    border: none;
    border-radius: 6px;
    color: #000;
    font-family: system-ui, -apple-system, sans-serif;
    font-size: 20px;
    font-weight: 900;
    letter-spacing: 4px;
    padding: 18px;
    cursor: pointer;
    text-transform: uppercase;
  }
  .setup-note {
    margin-top: 16px;
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 1px;
    text-align: center;
    max-width: 280px;
    line-height: 1.5;
  }
</style>
</head>
<body>

<!-- SETUP SCREEN -->
<div id="setupScreen">
  <div class="setup-logo">SPRAY<br>TRACK</div>
  <div class="setup-sub">FIELD GUIDANCE SYSTEM</div>

  <div class="setup-field">
    <label>Swath Width (ft)</label>
    <input type="number" id="setupSwath" value="30" min="1" max="200" inputmode="numeric">
  </div>
  <div class="setup-field">
    <label>Field Name (optional)</label>
    <input type="text" id="setupField" placeholder="e.g. North 22 Acres" autocomplete="off">
  </div>
  <div class="setup-field">
    <label>Units</label>
    <select id="setupUnits">
      <option value="acres">Acres</option>
      <option value="hectares">Hectares</option>
    </select>
  </div>

  <button class="setup-start" onclick="startSession()">START SESSION →</button>
  <div class="setup-note">Allow location access when prompted. Works best outdoors with clear sky view.</div>
</div>

<!-- MAIN APP -->
<div id="statusBar">
  <div class="logo">SPRAY TRACK</div>
  <div id="gpsStatus">
    <div class="gps-dot searching" id="gpsDot"></div>
    <span id="gpsText">ACQUIRING</span>
  </div>
</div>

<div id="mapWrap">
  <canvas id="mapCanvas"></canvas>
  <div id="passBadge">0 PASSES</div>
  <div id="overlapAlert">⚠ OVERLAP</div>
  <button id="followBtn" onclick="toggleFollow()">📍 FOLLOWING</button>
  <div id="compass">
    <svg viewBox="0 0 44 44" fill="none" xmlns="http://www.w3.org/2000/svg">
      <circle cx="22" cy="22" r="20" stroke="#1e2e1e" stroke-width="2"/>
      <text x="22" y="10" text-anchor="middle" fill="#FF3B30" font-family="Share Tech Mono" font-size="8" font-weight="bold">N</text>
      <text x="22" y="38" text-anchor="middle" fill="#4a6a4a" font-family="Share Tech Mono" font-size="7">S</text>
      <text x="8" y="26" text-anchor="middle" fill="#4a6a4a" font-family="Share Tech Mono" font-size="7">W</text>
      <text x="36" y="26" text-anchor="middle" fill="#4a6a4a" font-family="Share Tech Mono" font-size="7">E</text>
      <g id="compassNeedle" transform-origin="22 22">
        <polygon points="22,8 24,22 22,20 20,22" fill="#FF3B30"/>
        <polygon points="22,36 24,22 22,24 20,22" fill="#4a6a4a"/>
      </g>
    </svg>
  </div>
  <div id="wakeLock" style="display:none">🔆 SCREEN ON</div>
</div>

<div id="metrics">
  <div class="metric">
    <div class="metric-label">SPEED</div>
    <div class="metric-value" id="mSpeed">0.0</div>
    <div class="metric-unit">MPH</div>
  </div>
  <div class="metric">
    <div class="metric-label">COVERED</div>
    <div class="metric-value" id="mArea">0.0</div>
    <div class="metric-unit" id="mAreaUnit">ACRES</div>
  </div>
  <div class="metric">
    <div class="metric-label">HEADING</div>
    <div class="metric-value" id="mHeading">---</div>
    <div class="metric-unit">DEG</div>
  </div>
</div>

<div id="swathControl">
  <div class="sw-label">SWATH</div>
  <input type="range" id="swathSlider" min="5" max="120" step="1" value="30">
  <div id="swathVal">30 ft</div>
</div>

<div id="controls">
  <button class="btn btn-danger" onclick="clearAll()">CLEAR</button>
  <button class="btn btn-primary" id="recordBtn" onclick="toggleRecord()">▶ START PASS</button>
  <button class="btn btn-secondary" onclick="undoPass()">UNDO</button>
</div>

<div id="toast"></div>

<script>
// ══════════════════════════════════════════════
// STATE
// ══════════════════════════════════════════════
let state = {
  swathFt: 30,
  units: 'acres',
  fieldName: '',
  recording: false,
  passes: [],           // array of arrays of {lat,lon,x,y}
  currentPass: [],
  gpsReady: false,
  heading: null,
  speed: 0,
  totalArea: 0,
  watchId: null,
  origin: null,         // {lat, lon} — map center reference
  scale: 1,             // pixels per meter
  panX: 0, panY: 0,
  followMode: true,
  lastPos: null,
  wakeLock: null,
  deviceHeading: null
};

// ══════════════════════════════════════════════
// SETUP
// ══════════════════════════════════════════════
function startSession() {
  state.swathFt = parseFloat(document.getElementById('setupSwath').value) || 30;
  state.fieldName = document.getElementById('setupField').value;
  state.units = document.getElementById('setupUnits').value;
  document.getElementById('swathSlider').value = state.swathFt;
  document.getElementById('swathVal').textContent = state.swathFt + ' ft';
  document.getElementById('mAreaUnit').textContent = state.units === 'acres' ? 'ACRES' : 'HECT';
  document.getElementById('setupScreen').classList.add('hidden');
  initGPS();
  initCanvas();
  acquireWakeLock();
  // Device orientation for compass
  if (window.DeviceOrientationEvent) {
    if (typeof DeviceOrientationEvent.requestPermission === 'function') {
      DeviceOrientationEvent.requestPermission().then(p => {
        if (p === 'granted') window.addEventListener('deviceorientation', onOrientation);
      }).catch(() => {});
    } else {
      window.addEventListener('deviceorientation', onOrientation);
    }
  }
}

// ══════════════════════════════════════════════
// GPS
// ══════════════════════════════════════════════
function initGPS() {
  if (!navigator.geolocation) {
    showToast('GPS NOT AVAILABLE');
    return;
  }
  document.getElementById('gpsDot').className = 'gps-dot searching';
  document.getElementById('gpsText').textContent = 'ACQUIRING';

  state.watchId = navigator.geolocation.watchPosition(onPosition, onGPSError, {
    enableHighAccuracy: true,
    maximumAge: 1000,
    timeout: 10000
  });
}

function onPosition(pos) {
  const { latitude, longitude, speed, heading, accuracy } = pos.coords;

  if (!state.origin) {
    state.origin = { lat: latitude, lon: longitude };
    state.scale = 3.5; // pixels per meter, adjustable
    state.panX = 0; state.panY = 0;
    document.getElementById('gpsDot').className = 'gps-dot active';
    document.getElementById('gpsText').textContent = 'GPS ±' + Math.round(accuracy) + 'M';
    state.gpsReady = true;
  }

  // Update GPS text with accuracy
  document.getElementById('gpsText').textContent = 'GPS ±' + Math.round(accuracy) + 'M';

  // Convert lat/lon to canvas meters from origin
  const mx = haversineX(state.origin, latitude, longitude);
  const my = haversineY(state.origin, latitude, longitude);
  const cx = canvas.width / 2 + state.panX + mx * state.scale;
  const cy = canvas.height / 2 + state.panY - my * state.scale;

  state.lastPos = { lat: latitude, lon: longitude, x: cx, y: cy, mx, my };
  state.speed = speed ? speed * 2.23694 : 0; // m/s to mph
  if (heading !== null) state.heading = heading;

  // ── AUTO-FOLLOW: keep position centered ──
  if (state.followMode) {
    state.panX = -mx * state.scale;
    state.panY = my * state.scale;
  }

  document.getElementById('mSpeed').textContent = state.speed.toFixed(1);
  if (state.heading !== null) {
    document.getElementById('mHeading').textContent = Math.round(state.heading);
    rotateCompass(state.heading);
  }

  if (state.recording && state.lastPos) {
    state.currentPass.push({ lat: latitude, lon: longitude, x: cx, y: cy });
    updateArea();
  }

  renderMap();
}

function onGPSError(err) {
  document.getElementById('gpsDot').className = 'gps-dot';
  if (err.code === 1) {
    document.getElementById('gpsText').textContent = 'PERMISSION DENIED';
    showToast('ENABLE LOCATION IN SETTINGS');
  } else {
    document.getElementById('gpsText').textContent = 'NO GPS';
    showToast('GPS ERROR — GO OUTSIDE');
  }
}

// ══════════════════════════════════════════════
// COORDINATE MATH
// ══════════════════════════════════════════════
function haversineX(origin, lat, lon) {
  // East-west meters
  const R = 6371000;
  const dLon = (lon - origin.lon) * Math.PI / 180;
  const lat1 = origin.lat * Math.PI / 180;
  return R * dLon * Math.cos(lat1);
}
function haversineY(origin, lat, lon) {
  // North-south meters
  const R = 6371000;
  const dLat = (lat - origin.lat) * Math.PI / 180;
  return R * dLat;
}

// ══════════════════════════════════════════════
// CANVAS
// ══════════════════════════════════════════════
let canvas, ctx;
let pinchStart = null;

function initCanvas() {
  canvas = document.getElementById('mapCanvas');
  ctx = canvas.getContext('2d');
  resizeCanvas();
  window.addEventListener('resize', resizeCanvas);

  // Pinch-to-zoom
  canvas.addEventListener('touchstart', onTouchStart, { passive: false });
  canvas.addEventListener('touchmove', onTouchMove, { passive: false });
  canvas.addEventListener('touchend', onTouchEnd);
}

function resizeCanvas() {
  const wrap = document.getElementById('mapWrap');
  canvas.width = wrap.clientWidth * window.devicePixelRatio;
  canvas.height = wrap.clientHeight * window.devicePixelRatio;
  canvas.style.width = wrap.clientWidth + 'px';
  canvas.style.height = wrap.clientHeight + 'px';
  renderMap();
}

// ══════════════════════════════════════════════
// TOUCH (pan + pinch)
// ══════════════════════════════════════════════
let lastTouch = null;
let pinchDist0 = null;

function onTouchStart(e) {
  if (e.touches.length === 1) {
    lastTouch = { x: e.touches[0].clientX, y: e.touches[0].clientY };
  } else if (e.touches.length === 2) {
    pinchDist0 = getTouchDist(e.touches);
    lastTouch = null;
  }
}
function onTouchMove(e) {
  e.preventDefault();
  if (e.touches.length === 1 && lastTouch) {
    const dx = e.touches[0].clientX - lastTouch.x;
    const dy = e.touches[0].clientY - lastTouch.y;
    state.panX += dx * window.devicePixelRatio;
    state.panY += dy * window.devicePixelRatio;
    lastTouch = { x: e.touches[0].clientX, y: e.touches[0].clientY };
    // User is manually panning — disable follow
    state.followMode = false;
    document.getElementById('followBtn').classList.add('off');
    document.getElementById('followBtn').textContent = '📍 FOLLOW';
    renderMap();
  } else if (e.touches.length === 2 && pinchDist0) {
    const d = getTouchDist(e.touches);
    const factor = d / pinchDist0;
    state.scale = Math.max(0.5, Math.min(20, state.scale * factor));
    pinchDist0 = d;
    renderMap();
  }
}
function onTouchEnd(e) { lastTouch = null; pinchDist0 = null; }
function getTouchDist(touches) {
  const dx = touches[0].clientX - touches[1].clientX;
  const dy = touches[0].clientY - touches[1].clientY;
  return Math.sqrt(dx*dx + dy*dy);
}

// ══════════════════════════════════════════════
// RENDER
// ══════════════════════════════════════════════
function renderMap() {
  if (!canvas) return;
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  const W = canvas.width, H = canvas.height;
  const CX = W/2 + state.panX;
  const CY = H/2 + state.panY;
  const swathPx = feetToMeters(state.swathFt) * state.scale;

  // ── Draw completed passes ──
  state.passes.forEach((pass, pi) => {
    if (pass.length < 2) return;
    drawPass(pass, swathPx, 'rgba(57,255,20,0.22)', 'rgba(57,255,20,0.7)', false);
  });

  // ── Draw current pass ──
  if (state.currentPass.length > 1) {
    drawPass(state.currentPass, swathPx, 'rgba(57,255,20,0.45)', '#39FF14', true);
  }

  // ── Draw GPS position dot ──
  if (state.lastPos) {
    const { mx, my } = state.lastPos;
    const px = CX + mx * state.scale;
    const py = CY - my * state.scale;

    // Accuracy ring (approx)
    ctx.beginPath();
    ctx.arc(px, py, 8 * state.scale, 0, Math.PI*2);
    ctx.fillStyle = 'rgba(57,255,20,0.08)';
    ctx.fill();

    // Dot
    ctx.beginPath();
    ctx.arc(px, py, 8, 0, Math.PI*2);
    ctx.fillStyle = state.recording ? '#FF3B30' : '#39FF14';
    ctx.fill();
    ctx.beginPath();
    ctx.arc(px, py, 8, 0, Math.PI*2);
    ctx.strokeStyle = '#fff';
    ctx.lineWidth = 2;
    ctx.stroke();

    // Heading line
    if (state.heading !== null) {
      const rad = (state.heading - 90) * Math.PI / 180;
      const len = 40;
      ctx.beginPath();
      ctx.moveTo(px, py);
      ctx.lineTo(px + Math.cos(rad)*len, py + Math.sin(rad)*len);
      ctx.strokeStyle = state.recording ? '#FF3B30' : '#39FF14';
      ctx.lineWidth = 3;
      ctx.setLineDash([6,4]);
      ctx.stroke();
      ctx.setLineDash([]);
    }
  }

  // ── Scale bar ──
  drawScaleBar(W, H);
}

function drawPass(pts, swathPx, fill, stroke, isActive) {
  if (pts.length < 2) return;
  const CX = canvas.width/2 + state.panX;
  const CY = canvas.height/2 + state.panY;

  // Map stored mx,my -> current canvas coords (accounts for pan/scale changes)
  const mapped = pts.map(p => {
    if (p.mx !== undefined) {
      return { x: CX + p.mx * state.scale, y: CY - p.my * state.scale };
    }
    return { x: p.x, y: p.y };
  });

  // Build swath polygon
  const poly = buildSwathPoly(mapped, swathPx);
  if (!poly) return;

  ctx.beginPath();
  ctx.moveTo(poly[0].x, poly[0].y);
  for (let i = 1; i < poly.length; i++) ctx.lineTo(poly[i].x, poly[i].y);
  ctx.closePath();
  ctx.fillStyle = fill;
  ctx.fill();
  ctx.strokeStyle = stroke;
  ctx.lineWidth = isActive ? 2.5 : 1.5;
  ctx.stroke();

  // Center line
  ctx.beginPath();
  ctx.moveTo(mapped[0].x, mapped[0].y);
  for (let i = 1; i < mapped.length; i++) ctx.lineTo(mapped[i].x, mapped[i].y);
  ctx.strokeStyle = isActive ? 'rgba(255,255,255,0.5)' : 'rgba(57,255,20,0.3)';
  ctx.lineWidth = 1;
  ctx.setLineDash([4, 6]);
  ctx.stroke();
  ctx.setLineDash([]);

  // Pass number label
  if (!isActive && pts.length > 0) {
    const mid = mapped[Math.floor(mapped.length/2)];
    // handled via pass count badge
  }
}

function buildSwathPoly(pts, half) {
  if (pts.length < 2) return null;
  const left = [], right = [];
  for (let i = 0; i < pts.length; i++) {
    let dx, dy;
    if (i < pts.length - 1) {
      dx = pts[i+1].x - pts[i].x;
      dy = pts[i+1].y - pts[i].y;
    } else {
      dx = pts[i].x - pts[i-1].x;
      dy = pts[i].y - pts[i-1].y;
    }
    const len = Math.sqrt(dx*dx + dy*dy) || 1;
    const nx = -dy/len * half/2;
    const ny = dx/len * half/2;
    left.push({ x: pts[i].x + nx, y: pts[i].y + ny });
    right.push({ x: pts[i].x - nx, y: pts[i].y - ny });
  }
  return [...left, ...[...right].reverse()];
}

function drawScaleBar(W, H) {
  // 100 ft in pixels
  const ftPx = feetToMeters(100) * state.scale;
  const barY = H - 60;
  const barX = 20;
  ctx.fillStyle = 'rgba(57,255,20,0.7)';
  ctx.fillRect(barX, barY, ftPx, 3);
  ctx.fillRect(barX, barY-4, 2, 11);
  ctx.fillRect(barX+ftPx-2, barY-4, 2, 11);
  ctx.font = `${20 * window.devicePixelRatio}px "Share Tech Mono"`;
  ctx.fillStyle = 'rgba(57,255,20,0.7)';
  ctx.fillText('100 ft', barX, barY - 8);
}

// ══════════════════════════════════════════════
// RECORDING
// ══════════════════════════════════════════════
function toggleRecord() {
  if (!state.gpsReady) {
    showToast('WAITING FOR GPS');
    return;
  }
  state.recording = !state.recording;
  const btn = document.getElementById('recordBtn');
  if (state.recording) {
    state.currentPass = [];
    btn.textContent = '⏹ END PASS';
    btn.classList.add('recording');
    showToast('PASS STARTED');
  } else {
    if (state.currentPass.length > 1) {
      state.passes.push([...state.currentPass]);
      updatePassBadge();
      updateArea();
      showToast('PASS ' + state.passes.length + ' SAVED');
    } else {
      showToast('TOO SHORT — MOVE FIRST');
    }
    state.currentPass = [];
    btn.textContent = '▶ START PASS';
    btn.classList.remove('recording');
    renderMap();
  }
}

function undoPass() {
  if (state.recording) {
    state.recording = false;
    state.currentPass = [];
    const btn = document.getElementById('recordBtn');
    btn.textContent = '▶ START PASS';
    btn.classList.remove('recording');
    showToast('PASS CANCELLED');
    renderMap();
    return;
  }
  if (state.passes.length === 0) { showToast('NOTHING TO UNDO'); return; }
  state.passes.pop();
  updatePassBadge();
  updateArea();
  showToast('LAST PASS REMOVED');
  renderMap();
}

function clearAll() {
  if (state.passes.length === 0 && state.currentPass.length === 0) return;
  if (!confirm('Clear all passes?')) return;
  state.passes = [];
  state.currentPass = [];
  state.recording = false;
  state.totalArea = 0;
  const btn = document.getElementById('recordBtn');
  btn.textContent = '▶ START PASS';
  btn.classList.remove('recording');
  document.getElementById('mArea').textContent = '0.0';
  updatePassBadge();
  renderMap();
  showToast('CLEARED');
}

// ══════════════════════════════════════════════
// AREA CALCULATION
// ══════════════════════════════════════════════
function updateArea() {
  let totalSqM = 0;
  const allPasses = state.recording
    ? [...state.passes, state.currentPass]
    : state.passes;

  allPasses.forEach(pass => {
    if (pass.length < 2) return;
    let dist = 0;
    for (let i = 1; i < pass.length; i++) {
      const dx = (pass[i].mx ?? 0) - (pass[i-1].mx ?? 0);
      const dy = (pass[i].my ?? 0) - (pass[i-1].my ?? 0);
      dist += Math.sqrt(dx*dx + dy*dy);
    }
    totalSqM += dist * feetToMeters(state.swathFt);
  });

  const area = state.units === 'acres'
    ? totalSqM / 4046.86
    : totalSqM / 10000;

  document.getElementById('mArea').textContent = area.toFixed(2);
}

function updatePassBadge() {
  const n = state.passes.length;
  document.getElementById('passBadge').textContent = n + (n === 1 ? ' PASS' : ' PASSES');
}

// ══════════════════════════════════════════════
// HELPERS
// ══════════════════════════════════════════════
function toggleFollow() {
  state.followMode = !state.followMode;
  const btn = document.getElementById('followBtn');
  if (state.followMode) {
    btn.classList.remove('off');
    btn.textContent = '📍 FOLLOWING';
    showToast('FOLLOW MODE ON');
    // Snap back to current position immediately
    if (state.lastPos) {
      state.panX = -state.lastPos.mx * state.scale;
      state.panY = state.lastPos.my * state.scale;
      renderMap();
    }
  } else {
    btn.classList.add('off');
    btn.textContent = '📍 FOLLOW';
    showToast('FOLLOW MODE OFF');
  }
}



function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(t._timer);
  t._timer = setTimeout(() => t.classList.remove('show'), 2500);
}

function rotateCompass(heading) {
  const needle = document.getElementById('compassNeedle');
  if (needle) needle.setAttribute('transform', `rotate(${heading}, 22, 22)`);
}

function onOrientation(e) {
  let h = e.webkitCompassHeading ?? (e.alpha ? 360 - e.alpha : null);
  if (h !== null) {
    state.deviceHeading = h;
    if (state.heading === null) {
      state.heading = h;
      document.getElementById('mHeading').textContent = Math.round(h);
      rotateCompass(h);
    }
  }
}

async function acquireWakeLock() {
  if ('wakeLock' in navigator) {
    try {
      state.wakeLock = await navigator.wakeLock.request('screen');
      document.getElementById('wakeLock').style.display = 'block';
      state.wakeLock.addEventListener('release', () => {
        document.getElementById('wakeLock').style.display = 'none';
      });
    } catch(e) {}
  }
}

// ══════════════════════════════════════════════
// SWATH SLIDER (after setup)
// ══════════════════════════════════════════════
document.getElementById('swathSlider').addEventListener('input', function() {
  state.swathFt = parseFloat(this.value);
  document.getElementById('swathVal').textContent = this.value + ' ft';
  updateArea();
  renderMap();
});

// Re-acquire wake lock on visibility change
document.addEventListener('visibilitychange', async () => {
  if (document.visibilityState === 'visible' && state.wakeLock === null) {
    await acquireWakeLock();
  }
});
</script>
